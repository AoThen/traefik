name: Build Mini Image

on:
  push:
  workflow_dispatch:

env:
  GO_VERSION: '1.23'
  NODE_VERSION: '20'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: webui/yarn.lock

      - name: Install WebUI dependencies
        working-directory: webui
        run: yarn install --frozen-lockfile

      - name: Build WebUI
        working-directory: webui
        run: yarn build

      - name: Generate code
        run: go generate ./...

      - name: Build binary (mini - without Kubernetes and ACME)
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: amd64
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          DATE=$(date -u +%Y-%m-%d_%H:%M:%S)
          
          go build -tags "nokubernetes,noacme" \
            -ldflags "-s -w \
              -X github.com/traefik/traefik/v3/pkg/version.Version=${VERSION} \
              -X github.com/traefik/traefik/v3/pkg/version.Codename=mini \
              -X github.com/traefik/traefik/v3/pkg/version.BuildDate=${DATE}" \
            -trimpath \
            -o ./dist/linux/amd64/traefik \
            ./cmd/traefik
          
          ls -lh ./dist/linux/amd64/traefik

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=mini,enable={{is_default_branch}}
            type=raw,value=mini-{{sha}},enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: actions/delete-package-versions@v5
        with: 
          package-name: ${{ env.CONTAINER_NAME }}
          package-type: 'container'
          min-versions-to-keep: 2
          delete-only-untagged-versions: 'true'

  # Optional: Compare sizes
  compare-size:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    steps:
      - name: Pull and compare images
        run: |
          docker pull ghcr.io/${{ github.repository }}:mini 2>/dev/null || true
          docker pull traefik:v3 2>/dev/null || true
          
          echo "=== Image Size Comparison ==="
          docker images ghcr.io/${{ github.repository }}:mini --format "{{.Repository}}:{{.Tag}} - {{.Size}}" 2>/dev/null || echo "Mini image not found"
          docker images traefik:v3 --format "{{.Repository}}:{{.Tag}} - {{.Size}}" 2>/dev/null || echo "Official image not found"
